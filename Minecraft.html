<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Minecraft 2.0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #menu-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('menu.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; padding: 40px 0; z-index: 100;
        }
        #menu-survival, #menu-mundos {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('menu2.png');
            background-size: 64px; flex-direction: column; align-items: center; justify-content: center; z-index: 101;
        }
        .mc-btn {
            width: 400px; padding: 12px; margin: 5px; background: #5e5e5e; color: #fff;
            border: 3px solid #000; cursor: pointer; font-size: 18px; 
            text-shadow: 2px 2px #333; box-shadow: inset -4px -4px #333, inset 4px 4px #888;
            outline: none; text-align: center; display: block;
        }
        .mc-btn:hover { background: #7ba352; border-color: #fff; }
        
        .fila-botones { display: flex; gap: 10px; margin-top: 20px; }
        .btn-half { width: 195px; }
        #pantalla-carga {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000 url('menu2.png'); background-size: 64px;
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .progreso-bg { width: 300px; height: 20px; background: #444; border: 2px solid #fff; margin-top: 20px; }
        .progreso-fill { width: 0%; height: 100%; background: #55FF55; }
        #menu-pausa {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(8px); background: rgba(0,0,0,0.5);
            flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
        #hud {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; flex-direction: column; align-items: center; pointer-events: none;
        }
        .stats-container { display: flex; gap: 100px; margin-bottom: 5px; }
        .stat-row { display: flex; gap: 2px; }
        .heart { color: #ff0000; font-size: 24px; text-shadow: 2px 2px #000; }
        .heart.empty { color: #444; }
        .food { color: #ff9900; font-size: 24px; text-shadow: 2px 2px #000; }
        
        #inventory {
            display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border: 2px solid #888;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; background: #8b8b8b; color: white; font-size: 20px; }
        .slot.selected { border-color: #fff; box-shadow: 0 0 10px #fff; }

        #ui { position: absolute; top: 20px; left: 20px; color: white; display: none; text-shadow: 2px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; transform: translate(-50%, -50%); mix-blend-mode: difference; display: none; }
        .footer-text { position: absolute; bottom: 10px; color: #fff; font-size: 14px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="pantalla-carga">
    <h2 style="color:white; text-shadow:2px 2px #000;">GENERANDO MUNDO ESPERE...</h2>
    <div class="progreso-bg"><div id="progreso-barra" class="progreso-fill"></div></div>
</div>

<div id="menu-inicio">
    <img src="logo.png" width="550" alt="Minecraft" style="margin-bottom: 40px;">
    <button class="mc-btn" onclick="abrirMenuMundos()">SINGLE PLAYER</button>
    <button class="mc-btn" onclick="iniciarJuego('creativo')">CREATIVE MODE</button>
    <div class="fila-botones">
        <button class="mc-btn btn-half" onclick="alert('Bolo7 Demon Edition')">OPTIONS...</button>
        <button class="mc-btn btn-half" onclick="location.reload();">QUIT GAME</button>
    </div>
    <div class="footer-text" style="left:10px;">Version 2.2 - PRO Render</div>
    <div class="footer-text" style="right:10px;">Copyright Bolo7 Demon.</div>
</div>

<div id="menu-mundos">
    <h2 style="color:white; text-shadow:2px 2px #000;">SELECCIONAR MUNDO</h2>

    <input type="text" id="world-name" style="width:400px; padding:12px; background:#000; border:2px solid #a0a0a0; color:#fff; margin-bottom:15px;" placeholder="Nombre del mundo">

        <button class="mc-btn btn-half" onclick="cerrarMenuSurvival()">CANCELAR</button>

    <button class="mc-btn" onclick="cambiarCamara()">CÁMARA: <span id="cam-txt">1ª PERSONA</span></button>

<div id="ui">

</div>

    <div id="inventory">

<div class="slot" id="slot-2">⛏️</div>

<div class="slot" id="slot-6">🪟</div>

</div>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, player, steve, animalMesh, cloudGroup, fishMesh, isPaused = true;
    let placedBlocks = [];
    let instWater, waterPlane; 
    let rotVel = 0;
    let keys = {}, camMode = 1; 
    let isMining = false;
let mineTime = 0;
let raycaster = new THREE.Raycaster();
let drops = [];
let inventory = {
    wood: 0,
    dirt: 0,
    stone: 0
};
let selectedSlot = 1;
let removedBlocks = [];
const blockMap = new Map();
    let config = { nombre: '', modo: 'supervivencia' };
    let health = 10;
    const WATER_LEVEL = 11.8;

    let steveLeftArm, steveRightArm, steveLeftLeg, steveRightLeg;

    function obtenerMundos() {
        const data = localStorage.getItem('mc_worlds_index');
        return data ? JSON.parse(data) : [];
    }

    function abrirMenuMundos() {
        document.getElementById('menu-inicio').style.display = 'none';
        document.getElementById('menu-mundos').style.display = 'flex';
        const lista = document.getElementById('lista-mundos-cont');
        lista.innerHTML = '';
        obtenerMundos().forEach(m => {
            const div = document.createElement('div');
            div.style.padding = "15px"; div.style.borderBottom = "1px solid #333"; div.style.cursor = "pointer"; div.style.color = "white";
            div.innerHTML = `<span>${m.nombre}</span> <span style="float:right; color:lime;">${m.modo}</span>`;
            div.onclick = () => { config.nombre = m.nombre; config.modo = m.modo; iniciarJuego(); };
            lista.appendChild(div);
        });
    }

    function cerrarMenuMundos() { document.getElementById('menu-mundos').style.display = 'none'; document.getElementById('menu-inicio').style.display = 'flex'; }
    function abrirMenuSurvival() { document.getElementById('menu-mundos').style.display = 'none'; document.getElementById('menu-survival').style.display = 'flex'; }
    function cerrarMenuSurvival() { document.getElementById('menu-survival').style.display = 'none'; document.getElementById('menu-mundos').style.display = 'flex'; }

    function validarYEntrar() {
        const n = document.getElementById('world-name').value.trim() || "Mundo Nuevo";
        config.nombre = n;
        config.modo = 'supervivencia';
        let mundos = obtenerMundos();
        if(!mundos.find(m => m.nombre === n)) {
            mundos.push({nombre: n, modo: 'supervivencia'});
            localStorage.setItem('mc_worlds_index', JSON.stringify(mundos));
        }
        iniciarJuego();
    }

    function reanudar() { 
        document.getElementById('menu-pausa').style.display = 'none'; 
        isPaused = false; 
        document.body.requestPointerLock(); 
    }
    
    function cambiarCamara() { camMode = (camMode % 3) + 1; document.getElementById('cam-txt').innerText = ["", "1ª PERSONA", "3ª PERSONA (A)", "3ª PERSONA (F)"][camMode]; }

    function getHeight(x, z) {
        let s = config.nombre.length * 0.5;
        let n = Math.sin(x/15 + s) * Math.cos(z/15 + s) * 18;
        n += Math.sin(x/40) * 12;
        return Math.floor(n + 20);
    }

    function updateHealthUI() {
        const hb = document.getElementById('hearts-box');
        if(!hb) return; 
        if(config.modo === 'creativo') {
            hb.style.display = 'none';
            document.getElementById('food-box').style.display = 'none';
            return;
        }
        hb.style.display = 'flex';
        document.getElementById('food-box').style.display = 'flex';
        hb.innerHTML = '';
        for(let i=0; i<10; i++) {
            const span = document.createElement('span');
            span.className = i < health ? 'heart' : 'heart empty';
            span.innerText = '❤';
            hb.appendChild(span);
        }
    }

    function respawn() {
        health = 10;
        updateHealthUI();
        player.position.set(0, 100, 0);
        vY = 0;
        fallDist = 0;
    }

    function iniciarJuego(modo = null) {
        if(modo) config.modo = modo;
        document.querySelectorAll('#menu-inicio, #menu-survival, #menu-mundos').forEach(m => m.style.display = 'none');
        document.getElementById('pantalla-carga').style.display = 'flex';

        let p = 0;
        let itv = setInterval(() => {
            p += 2; 
            document.getElementById('progreso-barra').style.width = p + '%';
            if(p >= 100) { 
                clearInterval(itv); 
                document.getElementById('pantalla-carga').style.display = 'none'; 
                setupGame(); 
            }
        }, 15);
    }

    const solidBlocks = new Set();
    function checkCollision(pos) {
        const bx = Math.round(pos.x);
        const bz = Math.round(pos.z);
        const by = Math.floor(pos.y + 0.5); 
        return solidBlocks.has(`${bx},${by},${bz}`); 
    }

        document.getElementById('crosshair').style.display = 'block';

        updateHealthUI();
        document.getElementById('food-box').innerHTML = '🍗'.repeat(10).split('').map(f => `<span class="food">${f}</span>`).join('');

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 250);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(100, 200, 100);
        scene.add(sun);

        player = new THREE.Group();
        player.position.set(0, 100, 0); 
        scene.add(player);

        steve = new THREE.Group();
        const matArmor = new THREE.MeshBasicMaterial({color: 0x38d9ff});
const matArmorDark = new THREE.MeshBasicMaterial({color: 0x18a8c8});
const matSkin = new THREE.MeshLambertMaterial({color: 0xdbac82});
const matHair = new THREE.MeshLambertMaterial({color: 0x5d4037}); 

        const matBody = new THREE.MeshLambertMaterial({color: 0x00a86b});

const torso = new THREE.Mesh(
    new THREE.BoxGeometry(0.6, 0.8, 0.3),
    matBody
);
torso.position.y = 1.2;
        torso.position.y = 1.2;
        // ARMADURA PECHO
const armorChest = new THREE.Mesh(
    new THREE.BoxGeometry(0.72, 0.9, 0.4),
    matArmor
);
armorChest.position.y = 1.2;
steve.add(armorChest);
        
        const headGroup = new THREE.Group();
        const headBase = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matSkin);
        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.15, 0.52), matHair);
        hair.position.y = 0.2;
        const hairBack = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.3, 0.2), matHair);
        hairBack.position.set(0, 0.1, -0.17);
        const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.05), new THREE.MeshBasicMaterial({color: 0x000000}));
        eyeL.position.set(-0.12, 0.05, 0.26);
        const eyeR = eyeL.clone(); eyeR.position.x = 0.12;
        const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.05, 0.05), new THREE.MeshBasicMaterial({color: 0x000000}));
        mouth.position.set(0, -0.15, 0.26);
        headGroup.add(headBase, hair, hairBack, eyeL, eyeR, mouth);

const helmet = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.25, 0.55), matArmor);
helmet.position.y = 0.2;
headGroup.add(helmet);
helmet.material.transparent = true;
helmet.material.opacity = 0.9;
        headGroup.position.y = 1.85;

        steveLeftArm = new THREE.Mesh(
    new THREE.BoxGeometry(0.25, 0.8, 0.25),
    matSkin
);
steveLeftArm.position.set(-0.45, 1.2, 0);
steveRightArm = steveLeftArm.clone();
steveRightArm.position.x = 0.45;

const armorArmL = new THREE.Mesh(
    new THREE.BoxGeometry(0.32, 0.85, 0.32),
    matArmor
);
armorArmL.position.set(-0.45, 1.2, 0);

const armorArmR = armorArmL.clone();
armorArmR.position.x = 0.45;

const shoulderL = new THREE.Mesh(
    new THREE.BoxGeometry(0.42, 0.22, 0.42),
    matArmor
);
shoulderL.position.set(-0.45, 1.6, 0);

const shoulderR = shoulderL.clone();
shoulderR.position.x = 0.45;

steveLeftArm.add(armorArmL);
steveRightArm.add(armorArmR);
steveLeftArm.add(shoulderL);
steveRightArm.add(shoulderR);

armorArmL.position.set(0, 0, 0);
armorArmR.position.set(0, 0, 0);
shoulderL.position.set(0, 0.35, 0);
shoulderR.position.set(0, 0.35, 0);
        
        const matPants = new THREE.MeshLambertMaterial({color: 0x3c44aa});
steveLeftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.8, 0.28), matPants);
        steveLeftLeg.position.set(-0.15, 0.4, 0);
        steveRightLeg = steveLeftLeg.clone(); steveRightLeg.position.x = 0.15;
        const armorLegL = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.85, 0.34), matArmorDark);
armorLegL.position.set(-0.15, 0.4, 0);

const armorLegR = armorLegL.clone();
armorLegR.position.x = 0.15;

steveLeftLeg.add(armorLegL);
steveRightLeg.add(armorLegR);

armorLegL.position.set(0, 0, 0);
armorLegR.position.set(0, 0, 0);
        
        steve.add(torso, headGroup, steveLeftArm, steveRightArm, steveLeftLeg, steveRightLeg);
        player.add(steve);

        const box = new THREE.BoxGeometry(1, 1, 1);

function texturaPixel(base, variacion) {
    const canvas = document.createElement('canvas');
    canvas.width = 16;
    canvas.height = 16;
    const ctx = canvas.getContext('2d');

    for(let y = 0; y < 16; y++) {
        for(let x = 0; x < 16; x++) {
            const r = base[0] + Math.floor((Math.random() - 0.5) * variacion);
            const g = base[1] + Math.floor((Math.random() - 0.5) * variacion);
            const b = base[2] + Math.floor((Math.random() - 0.5) * variacion);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(x, y, 1, 1);
        }
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
}

const texGrass = texturaPixel([75, 145, 45], 55);
const texDirt = texturaPixel([115, 75, 40], 55);
const texStone = texturaPixel([115, 115, 115], 60);
function texturaTronco() {
    const canvas = document.createElement('canvas');
    canvas.width = 16;
    canvas.height = 16;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#6b4a2a';
    ctx.fillRect(0, 0, 16, 16);

    for(let x = 2; x < 16; x += 4) {
        ctx.fillStyle = '#3b2615';
        ctx.fillRect(x, 0, 1, 16);
    }

    for(let i = 0; i < 35; i++) {
        ctx.fillStyle = Math.random() > 0.5 ? '#8a6238' : '#2f1d10';
        ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
    }

    const tex = new THREE.CanvasTexture(canvas);
    tex.magFilter = THREE.NearestFilter;
    tex.minFilter = THREE.NearestFilter;
    return tex;
}

const texWood = texturaTronco();
const texLeaves = texturaPixel([45, 100, 25], 70);

const mGrass = [
    new THREE.MeshLambertMaterial({ map: texDirt }),
    new THREE.MeshLambertMaterial({ map: texDirt }),
    new THREE.MeshLambertMaterial({ map: texGrass }),
    new THREE.MeshLambertMaterial({ map: texDirt }),
    new THREE.MeshLambertMaterial({ map: texDirt }),
    new THREE.MeshLambertMaterial({ map: texDirt })
];

const mDirt = new THREE.MeshLambertMaterial({ map: texDirt });
const mStone = new THREE.MeshLambertMaterial({ map: texStone });
const mWood = new THREE.MeshLambertMaterial({ map: texWood });
const mLeaf = new THREE.MeshLambertMaterial({ map: texLeaves }); 
        
        const mWater = new THREE.MeshLambertMaterial({
    color: 0x1caeff,
    transparent: true,
    opacity: 0.45,
    depthWrite: false,
    side: THREE.DoubleSide
});

        const WORLD_W = 300;
        const instGrass = new THREE.InstancedMesh(box, mGrass, WORLD_W * WORLD_W);
        const instDirt = new THREE.InstancedMesh(box, mDirt, WORLD_W * WORLD_W * 5);
        const instStone = new THREE.InstancedMesh(box, mStone, WORLD_W * WORLD_W * 12);
        
        const instWood = new THREE.InstancedMesh(box, mWood, 20000);
        const instLeaf = new THREE.InstancedMesh(box, mLeaf, 50000);

        const dummy = new THREE.Object3D();
        let gIdx=0, dIdx=0, sIdx=0, wIdx=0, woIdx=0, lIdx=0;

        for(let x = -WORLD_W/2; x < WORLD_W/2; x++) {
            for(let z = -WORLD_W/2; z < WORLD_W/2; z++) {
                let h = getHeight(x, z);
                dummy.position.set(x, h, z); dummy.updateMatrix();
                instGrass.setMatrixAt(gIdx++, dummy.matrix);
                solidBlocks.add(`${x},${h},${z}`);
                blockMap.set(`${x},${h},${z}`, { type: "grass", mesh: instGrass, index: gIdx - 1 });

                for(let y=1; y<=4; y++) {
                    dummy.position.set(x, h-y, z); dummy.updateMatrix();
                    instDirt.setMatrixAt(dIdx++, dummy.matrix);
                    solidBlocks.add(`${x},${h-y},${z}`);
                    
                }
                for(let y=5; y<=15; y++) {
                    dummy.position.set(x, h-y, z); dummy.updateMatrix();
                    instStone.setMatrixAt(sIdx++, dummy.matrix);
                    solidBlocks.add(`${x},${h-y},${z}`);
                }
                
                

                if(h >= 12 && Math.random() < 0.015) {
                    const treeH = 4 + Math.floor(Math.random() * 3);
                    for(let th=1; th<=treeH; th++) {
                        dummy.position.set(x, h+th, z); dummy.updateMatrix();
                        instWood.setMatrixAt(woIdx++, dummy.matrix);
                        solidBlocks.add(`${x},${h+th},${z}`);
                        blockMap.set(`${x},${h+th},${z}`, { type: "wood", mesh: instWood, index: woIdx - 1 });
                    }
                    for(let lx=-1; lx<=1; lx++) {
                        for(let lz=-1; lz<=1; lz++) {
                            for(let ly=0; ly<=2; ly++) {
                                dummy.position.set(x+lx, h+treeH+ly, z+lz); dummy.updateMatrix();
                                instLeaf.setMatrixAt(lIdx++, dummy.matrix);
                                solidBlocks.add(`${Math.round(x+lx)},${Math.round(h+treeH+ly)},${Math.round(z+lz)}`);
                            }
                        }
                    }
                }
            }
        }
        scene.add(instGrass, instDirt, instStone, instWood, instLeaf);

waterPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(WORLD_W, WORLD_W),
    mWater
);

waterPlane.rotation.x = -Math.PI / 2;
waterPlane.position.y = WATER_LEVEL;

scene.add(waterPlane);

        fishMesh = new THREE.Group();

            fish.userData.speed = 0.05 + Math.random() * 0.05;
            fishMesh.add(fish);
        }
        scene.add(fishMesh);

        cloudGroup = new THREE.Group();
        const matCloud = new THREE.MeshLambertMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
        for(let i=0; i<40; i++) {
            let cloud = new THREE.Group();
            let size = 3 + Math.random() * 5;
            for(let j=0; j<5; j++) {
                let part = new THREE.Mesh(new THREE.BoxGeometry(size, size/2, size), matCloud);
                part.position.set(j*2, Math.random(), Math.random()*2);
                cloud.add(part);
            }
            cloud.position.set((Math.random()-0.5)*400, 60 + Math.random()*20, (Math.random()-0.5)*400);
            cloud.userData.speed = 0.02 + Math.random() * 0.05;
            cloudGroup.add(cloud);
        }
        scene.add(cloudGroup);

        animalMesh = new THREE.Group();
        const matWhite = new THREE.MeshLambertMaterial({color: 0xffffff});
const matBlack = new THREE.MeshLambertMaterial({color: 0x000000});
const matPink = new THREE.MeshLambertMaterial({color: 0xffb6c1});

        for(let i=0; i<30; i++) {
            let animal = new THREE.Group();
            let body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 1.2), matWhite);
            body.position.y = 0.8;
            
            let animalHead = new THREE.Group();
            let face = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), matWhite);
            let eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), matBlack);
            eyeL.position.set(-0.15, 0.1, 0.25);
            let eyeR = eyeL.clone(); eyeR.position.x = 0.15;
            let snout = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.15, 0.1), matPink);
            snout.position.set(0, -0.1, 0.25);
            animalHead.add(face, eyeL, eyeR, snout);
            animalHead.position.set(0, 1.0, 0.6);

            const legGeo = new THREE.BoxGeometry(0.2, 0.5, 0.2);
            let p1 = new THREE.Mesh(legGeo, matWhite); p1.position.set(0.2, 0.25, 0.4);
            let p2 = new THREE.Mesh(legGeo, matWhite); p2.position.set(-0.2, 0.25, 0.4);
            let p3 = new THREE.Mesh(legGeo, matWhite); p3.position.set(0.2, 0.25, -0.4);
            let p4 = new THREE.Mesh(legGeo, matWhite); p4.position.set(-0.2, 0.25, -0.4);
            
            animal.legs = [p1, p2, p3, p4]; 
            animal.add(body, animalHead, p1, p2, p3, p4);
            
            let ax, az, ay;
            let intentos = 0;
            do {
                ax = (Math.random() - 0.5) * 250;
                az = (Math.random() - 0.5) * 250;
                ay = getHeight(ax, az);
                intentos++;
            } while(ay < 12.5 && intentos < 100);

            animal.position.set(ax, ay, az);
            animalMesh.add(animal);
        }
        scene.add(animalMesh);

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') { 
                isPaused = true; 
                document.getElementById('menu-pausa').style.display = 'flex'; 
                document.exitPointerLock(); 
            }
            if(e.code.includes('Digit')) {
                const num = e.code.replace('Digit','');
                if(document.getElementById('slot-' + num)) {
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                    document.getElementById('slot-' + num).classList.add('selected');
                    selectedSlot = Number(num);
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        document.addEventListener('mousemove', e => {
    if(isPaused) return;

    const sensibilidad = 0.0015; // 🔥 ajusta aquí si quieres más lento o rápido

    player.rotation.y -= e.movementX * sensibilidad;
    camera.rotation.x -= e.movementY * sensibilidad;

    camera.rotation.x = Math.max(-1.2, Math.min(1., camera.rotation.x));
});

        window.addEventListener("contextmenu", e => e.preventDefault());

window.addEventListener('mousedown', (e) => {
    if(isPaused) return;

    if(e.button === 0) {
        isMining = true;
        romperBloque();
    }

    if(e.button === 2) {
        ponerBloque();
    }
});

window.addEventListener('mouseup', (e) => {
    if(e.button === 0) {
        isMining = false;
        mineTime = 0;
    }
});

window.addEventListener('click', () => {
    if (document.getElementById('menu-inicio').style.display === 'none' && 
        document.getElementById('pantalla-carga').style.display === 'none') {
        document.body.requestPointerLock();
        if (isPaused) reanudar();
    }
});

        isPaused = false;
   let placedBlocks = [];     
function romperBloque() {
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

    const objetos = [instGrass, instDirt, instStone, instWood, instLeaf, ...placedBlocks];
    const hits = raycaster.intersectObjects(objetos);

    if(hits.length === 0) return;

    const hit = hits[0];
    if(hit.distance > 6) return;

    // 🔹 Si es bloque que tú pusiste
    if(!hit.object.isInstancedMesh) {
        scene.remove(hit.object);
        placedBlocks = placedBlocks.filter(b => b !== hit.object);

        const x = Math.round(hit.object.position.x);
        const y = Math.round(hit.object.position.y);
        const z = Math.round(hit.object.position.z);

        solidBlocks.delete(`${x},${y},${z}`);
        return;
    }

    // 🔹 Si es bloque del mundo
    if(hit.instanceId === undefined) return;

    const mesh = hit.object;
    const id = hit.instanceId;

    const matrix = new THREE.Matrix4();
    const pos = new THREE.Vector3();

    mesh.getMatrixAt(id, matrix);
    pos.setFromMatrixPosition(matrix);

    const x = Math.round(pos.x);
const y = Math.round(pos.y);
const z = Math.round(pos.z);

    const dummy = new THREE.Object3D();
    dummy.position.set(99999, 99999, 99999);
    dummy.updateMatrix();

    mesh.setMatrixAt(id, dummy.matrix);
    mesh.instanceMatrix.needsUpdate = true;

    solidBlocks.delete(`${x},${y},${z}`);
    removedBlocks.push(`${x},${y},${z}`);
}

function ponerBloque() {
    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

    const objetos = [instGrass, instDirt, instStone, instWood, instLeaf, ...placedBlocks];
    const hits = raycaster.intersectObjects(objetos);

    if(hits.length === 0) return;

    const hit = hits[0];
    if(hit.distance > 6) return;

    const pos = hit.point.clone().add(hit.face.normal.multiplyScalar(0.5));

    const x = Math.round(pos.x);
    const y = Math.round(pos.y);
    const z = Math.round(pos.z);

    if(selectedSlot === 1 || selectedSlot === 2) return; // espada y pico NO ponen bloques

let geo = new THREE.BoxGeometry(1,1,1);
let mat = mWood;

if(selectedSlot === 3) mat = mWood; // madera
if(selectedSlot === 4) mat = mStone; // piedra
if(selectedSlot === 5) { // puerta
    geo = new THREE.BoxGeometry(1,2,0.15);
    mat = mWood;
}
if(selectedSlot === 6) { // ventana
    geo = new THREE.BoxGeometry(1,1,0.12);
    mat = new THREE.MeshLambertMaterial({color: 0x88ddff, transparent:true, opacity:0.45});
}
if(selectedSlot === 7) mat = new THREE.MeshLambertMaterial({color: 0xff0000}); // lana roja
if(selectedSlot === 8) { // cama
    geo = new THREE.BoxGeometry(2,0.4,1);
    mat = new THREE.MeshLambertMaterial({color: 0xaa0000});
}
if(selectedSlot === 9) mat = new THREE.MeshLambertMaterial({color: 0x7a4a22}); // mesa

const bloque = new THREE.Mesh(geo, mat);

    bloque.position.set(x, y, z);
    bloque.userData.slot = selectedSlot;
    scene.add(bloque);
placedBlocks.push(bloque);

solidBlocks.add(`${x},${y},${z}`);
}


        animate();
    }

    let vY = 0;
    let fallDist = 0;
    let walkTimer = 0;

    function animate() {
        if(isPaused) { 
            requestAnimationFrame(animate); 
            return; 
        }
        requestAnimationFrame(animate);
        
        

        if(waterPlane) {
    waterPlane.position.y = WATER_LEVEL + Math.sin(Date.now() * 0.001) * 0.05;
}

        let speed = keys['ShiftLeft'] ? 0.3 : 0.15;
        let oldPos = player.position.clone();
        let isMoving = false;

        // Movimiento hacia adelante y atrás
if(keys['KeyW']) { 
    player.translateZ(-speed); 
    isMoving = true; 
}
if(keys['KeyS']) { 
    player.translateZ(speed); 
    isMoving = true; 
}

// IZQUIERDA (como Minecraft)
if(keys['KeyA']) { 
    player.translateX(-speed); 
    isMoving = true;
}

// DERECHA (como Minecraft)
if(keys['KeyD']) { 
    player.translateX(speed); 
    isMoving = true;
}
if(isMoving) {
    walkTimer += 0.18;

    let walkSwing = Math.sin(walkTimer) * 0.8;

    steveLeftLeg.rotation.x = walkSwing;
    steveRightLeg.rotation.x = -walkSwing;

    if(!isMining) {
        steveLeftArm.rotation.x = -walkSwing;
        steveRightArm.rotation.x = walkSwing;
    }
} else {
    steveLeftLeg.rotation.x = 0;
    steveRightLeg.rotation.x = 0;

    if(!isMining) {
        steveLeftArm.rotation.x = 0;
        steveRightArm.rotation.x = 0;
    }
}
        if(isMining) {
    mineTime += 0.10;

    let swing = Math.sin(mineTime * 3) * 1.5;

    steveRightArm.rotation.x = -1.2 + swing; // golpe fuerte
    steveLeftArm.rotation.x = Math.sin(mineTime * 3) * 0.2; // leve apoyo
}

        if(checkCollision(player.position)) {
            player.position.x = oldPos.x;
            player.position.z = oldPos.z;
        }

        let px = Math.round(player.position.x);
let pz = Math.round(player.position.z);
let sueloY = -999;

for(let y = Math.floor(player.position.y); y >= -20; y--) {
    if(solidBlocks.has(`${px},${y},${pz}`)) {
        sueloY = y + 1.2;
        break;
    }
}

let gH = sueloY;
        let inWater = player.position.y <= WATER_LEVEL + 0.5;
        if(player.position.y < WATER_LEVEL) {
    scene.background = new THREE.Color(0x0b6fae);
    scene.fog = new THREE.Fog(0x0b6fae, 5, 60);
} else {
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 250);
}

        if(player.position.y > gH) {
            if(inWater) {
                vY -= 0.005;
                if(vY < -0.05) vY = -0.05;
                if(keys['Space']) vY = 0.1;
            } else {
                vY -= 0.02;
                fallDist += Math.abs(vY);
            }
        } else {
            if(fallDist > 4.5 && config.modo === 'supervivencia') { 
                health -= 1;
                updateHealthUI();
                if(health <= 0) respawn();
            }
            player.position.y = gH; 
            vY = 0; 
            fallDist = 0;
            if(keys['Space']) vY = 0.32; 
        }
        player.position.y += vY;

        fishMesh.children.forEach(f => {
            f.translateZ(f.userData.speed);
            if(f.position.distanceTo(new THREE.Vector3(0, WATER_LEVEL-2, 0)) > 100) f.rotation.y += Math.PI;
        });

        cloudGroup.children.forEach(c => {
            c.position.x += c.userData.speed;
            if(c.position.x > 200) c.position.x = -200;
        });

        animalMesh.children.forEach((a, index) => {
            let testDirX = Math.sin(a.rotation.y) * 0.5;
            let testDirZ = Math.cos(a.rotation.y) * 0.5;
            let testH = getHeight(a.position.x + testDirX, a.position.z + testDirZ);

            if (testH < 12.5 || testH > a.position.y + 1) {
                a.rotation.y += Math.PI * 0.5; 
            } else {
                a.translateZ(0.02); 
                a.position.y = getHeight(a.position.x, a.position.z);
                if(a.legs) {
                    let wave = Math.sin(Date.now() * 0.01 + index) * 0.6;
                    a.legs[0].rotation.x = wave; a.legs[1].rotation.x = -wave;
                    a.legs[2].rotation.x = -wave; a.legs[3].rotation.x = wave;
                }
            }
            if(Math.random() < 0.01) a.rotation.y += (Math.random() - 0.5);
        });

        // --- LÓGICA DE CÁMARA Y ROTACIÓN DE STEVE (MODIFICADO) ---
        if(camMode === 1) {
    steve.visible = true;

    // ocultar cuerpo pero dejar brazos visibles
    steve.children.forEach(obj => {
        if(obj !== steveLeftArm && obj !== steveRightArm) {
            obj.visible = false;
        }
    });

    steveLeftArm.visible = true;
    steveRightArm.visible = true;

    camera.position.set(player.position.x, player.position.y + 1.6, player.position.z);
    camera.rotation.y = player.rotation.y;
} else {
            steve.visible = true;
            steve.children.forEach(obj => obj.visible = true);
            
            // Si es Cámara 3 (Frontal), Steve mira a la cámara (180 grados)
            // Si es Cámara 2 (Trasera), Steve mira hacia adelante (0 grados)
            steve.quaternion.copy(player.quaternion);

            let dist = camMode === 2 ? 5 : -5;
let off = new THREE.Vector3(0, 2.5, dist).applyQuaternion(player.quaternion);

camera.position.copy(player.position).add(off);

let lookY = player.position.y + 1.2 - camera.rotation.x * 4;

camera.lookAt(
    player.position.x,
    lookY,
    player.position.z
);
        }

        document.getElementById('coords').innerText = `X: ${Math.round(player.position.x)} Y: ${Math.round(player.position.y)} Z: ${Math.round(player.position.z)}`;
        renderer.render(scene, camera);
    }

    function guardarYSalir() {
    const save = {
        player: {
            x: player.position.x,
            y: player.position.y,
            z: player.position.z,
            ry: player.rotation.y
        },
        placedBlocks: placedBlocks.map(b => ({
            x: b.position.x,
            y: b.position.y,
            z: b.position.z,
            slot: b.userData.slot || 3
        })),
        removedBlocks: removedBlocks
    };

    localStorage.setItem("save_" + config.nombre, JSON.stringify(save));

    location.reload();
}
